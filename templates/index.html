<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top: #0d1b2e;
      --bg-mid: #112240;
      --bg-bot: #0d2818;
      --card: rgba(255,255,255,0.06);
      --card-hover: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --text: #e8f4fd;
      --muted: #7fb3d3;
      --accent: #4fc3f7;
      --rain: #81d4fa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bot) 100%);
      min-height: 100vh;
      color: var(--text);
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    header h1 {
      font-size: 1.9rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    /* ── Search ── */
    .search-form {
      display: flex;
      gap: 0.5rem;
      max-width: 500px;
      margin: 0 auto 2rem;
    }
    .search-form input {
      flex: 1;
      padding: 0.75rem 1.1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-form input:focus { border-color: var(--accent); }
    .search-form input::placeholder { color: var(--muted); }
    .search-form button {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #0d1b2e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .search-form button:hover { opacity: 0.85; }
    .search-form button:disabled { opacity: 0.55; cursor: default; }

    /* ── Error ── */
    .error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.28);
      color: #fca5a5;
      padding: 0.9rem 1.2rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* ── Note / hint ── */
    .note {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 1.5rem;
    }
    .note a { color: var(--accent); text-decoration: none; }
    .note a:hover { text-decoration: underline; }

    /* ── Current conditions ── */
    .current-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem 2.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }
    .current-icon img { width: 100px; height: 100px; }
    .current-main { flex: 1; }
    .current-location { font-size: 1rem; color: var(--muted); margin-bottom: 0.2rem; }
    .current-period { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.4rem; }
    .current-temp {
      font-size: 4rem;
      font-weight: 200;
      line-height: 1;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }
    .current-desc { font-size: 1rem; color: var(--muted); margin-bottom: 0.75rem; }
    .current-meta { display: flex; gap: 1.5rem; font-size: 0.88rem; color: var(--muted); flex-wrap: wrap; }

    /* ── Section label ── */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* ── Hourly strip ── */
    .hourly-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.75rem 0.25rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }
    .hourly-wrap::-webkit-scrollbar { height: 4px; }
    .hourly-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .hourly-items { display: flex; gap: 0; min-width: max-content; }
    .hourly-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 0.85rem;
      border-radius: 10px;
      min-width: 62px;
      transition: background 0.15s;
      cursor: default;
    }
    .hourly-item:hover { background: var(--card-hover); }
    .hourly-time { font-size: 0.72rem; color: var(--muted); }
    .hourly-item img { width: 30px; height: 30px; }
    .hourly-temp { font-size: 0.9rem; font-weight: 500; }
    .hourly-precip { font-size: 0.68rem; color: var(--rain); }

    /* ── 7-day forecast ── */
    .forecast-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .forecast-row {
      display: grid;
      grid-template-columns: 140px 48px 1fr auto auto;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .forecast-row:last-child { border-bottom: none; }
    .forecast-row:hover { background: var(--card-hover); }
    .forecast-day { font-size: 0.92rem; font-weight: 500; }
    .forecast-day.night { color: var(--muted); font-size: 0.85rem; font-weight: 400; }
    .forecast-row img { width: 40px; height: 40px; }
    .forecast-desc {
      font-size: 0.83rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .forecast-precip { font-size: 0.78rem; color: var(--rain); white-space: nowrap; min-width: 2.5rem; text-align: right; }
    .forecast-temp { font-size: 0.95rem; font-weight: 500; white-space: nowrap; text-align: right; }
    .forecast-temp.night { color: var(--muted); font-size: 0.88rem; font-weight: 400; }

    /* ── Lookup history ── */
    .history-section { margin-top: 3rem; }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      font-size: 0.85rem;
    }
    .history-table th {
      text-align: left;
      padding: 0.65rem 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: var(--card-hover); }
    .badge-ok  { color: #86efac; font-size: 0.75rem; }
    .badge-err { color: #fca5a5; font-size: 0.75rem; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .current-card { flex-direction: column; text-align: center; padding: 1.5rem; gap: 1rem; }
      .current-meta { justify-content: center; }
      .forecast-row { grid-template-columns: 110px 36px 1fr auto; }
      .forecast-precip { display: none; }
      .forecast-desc { display: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <header style="position:relative;">
    <h1>&#9925; Weather</h1>
    <a href="/history" style="position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:0.85rem;color:var(--muted);text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">History &#8594;</a>
  </header>

  <form class="search-form" id="search-form">
    <input type="text" id="city-input" placeholder="Enter a US city (e.g. Chicago, IL)" autofocus>
    <button type="submit" id="search-btn">Search</button>
  </form>

  <div class="error" id="error-box" style="display:none;"></div>

  <div id="weather-result">
    <div class="note">Enter a US city name above to see the current forecast.</div>
  </div>

  <div id="recent-section"></div>

</div>
<script>
  const HINT = '<div class="note">Enter a US city name above to see the current forecast.</div>';

  function esc(v) {
    return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    const day = String(d.getDate()).padStart(2, '0');
    const h   = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${mon} ${day} ${h}:${min}`;
  }

  function buildWeather(w) {
    const cur = w.current;
    const loc = (w.city && w.state) ? `${esc(w.city)}, ${esc(w.state)}` : esc(w.display_name);

    const hourlyHtml = w.hourly.map(p => `
      <div class="hourly-item">
        <div class="hourly-time">${esc(p.hour)}</div>
        <img src="${esc(p.icon)}" alt="${esc(p.shortForecast)}">
        <div class="hourly-temp">${esc(p.temperature)}&deg;</div>
        <div class="hourly-precip">${p.precip != null ? esc(p.precip) + '%' : '&nbsp;'}</div>
      </div>`).join('');

    const periodsHtml = w.periods.map(p => `
      <div class="forecast-row">
        <div class="forecast-day ${p.isDaytime ? '' : 'night'}">${esc(p.name)}</div>
        <img src="${esc(p.icon)}" alt="${esc(p.shortForecast)}">
        <div class="forecast-desc">${esc(p.shortForecast)}</div>
        <div class="forecast-precip">${p.precip != null ? esc(p.precip) + '%' : ''}</div>
        <div class="forecast-temp ${p.isDaytime ? '' : 'night'}">${esc(p.temperature)}&deg;${esc(p.temperatureUnit)}</div>
      </div>`).join('');

    const precipHtml    = cur.precip != null ? `<span>&#128167; ${esc(cur.precip)}% precip.</span>` : '';
    const humidityHtml  = cur.relativeHumidity?.value != null ? `<span>&#128167; ${esc(cur.relativeHumidity.value)}% humidity</span>` : '';

    return `
      <div class="current-card">
        <div class="current-icon"><img src="${esc(cur.icon)}" alt="${esc(cur.shortForecast)}"></div>
        <div class="current-main">
          <div class="current-location">${loc}</div>
          <div class="current-period">${esc(cur.name)}</div>
          <div class="current-temp">${esc(cur.temperature)}&deg;${esc(cur.temperatureUnit)}</div>
          <div class="current-desc">${esc(cur.shortForecast)}</div>
          <div class="current-meta">
            <span>&#128168; ${esc(cur.windSpeed)} ${esc(cur.windDirection)}</span>
            ${precipHtml}${humidityHtml}
          </div>
        </div>
      </div>
      <div class="section-label">Next 12 Hours</div>
      <div class="hourly-wrap"><div class="hourly-items">${hourlyHtml}</div></div>
      <div class="section-label">7-Day Forecast</div>
      <div class="forecast-list">${periodsHtml}</div>
      <div class="note">
        Weather data from <a href="https://www.weather.gov" target="_blank" rel="noopener">National Weather Service</a>
        &middot; Geocoding by <a href="https://nominatim.openstreetmap.org" target="_blank" rel="noopener">Nominatim / OSM</a>
        &middot; US locations only
      </div>`;
  }

  async function loadRecent() {
    try {
      const rows = await fetch('/api/recent').then(r => r.json());
      const section = document.getElementById('recent-section');
      if (!rows.length) { section.innerHTML = ''; return; }

      const rowsHtml = rows.map(row => {
        const loc = (row.nws_city && row.nws_state)
          ? esc(`${row.nws_city}, ${row.nws_state}`)
          : (row.display_name ? esc(row.display_name.substring(0, 40)) : '&mdash;');
        const cond = row.current_temp != null
          ? `${esc(row.current_temp)}&deg;${esc(row.current_unit)} &mdash; ${esc(row.current_forecast)}`
          : '&mdash;';
        const badge = row.success
          ? '<span class="badge-ok">&#10003;</span>'
          : `<span class="badge-err" title="${esc(row.error_message)}">&#10007;</span>`;
        return `<tr>
          <td>${esc(row.query)}</td>
          <td>${loc}</td>
          <td>${cond}</td>
          <td>${fmtDate(row.searched_at)}</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');

      section.innerHTML = `
        <div class="history-section">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.6rem;">
            <div class="section-label" style="margin-bottom:0;">Recent Lookups</div>
            <a href="/history" style="font-size:0.8rem;color:var(--muted);text-decoration:none;transition:color 0.15s;"
               onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">View all &#8594;</a>
          </div>
          <table class="history-table">
            <thead><tr><th>Query</th><th>Location</th><th>Conditions</th><th>When</th><th>Status</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;
    } catch { /* silently fail */ }
  }

  document.getElementById('search-form').addEventListener('submit', async e => {
    e.preventDefault();
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;

    const btn = document.getElementById('search-btn');
    const errorBox = document.getElementById('error-box');
    btn.disabled = true;
    btn.textContent = 'Searching…';
    errorBox.style.display = 'none';

    try {
      const resp = await fetch('/api/weather?' + new URLSearchParams({city}));
      const data = await resp.json();
      if (data.error) {
        errorBox.textContent = data.error;
        errorBox.style.display = '';
        document.getElementById('weather-result').innerHTML = HINT;
      } else {
        const loc = (data.weather.city && data.weather.state)
          ? `${data.weather.city}, ${data.weather.state}`
          : data.weather.display_name;
        document.title = `Weather — ${loc}`;
        document.getElementById('weather-result').innerHTML = buildWeather(data.weather);
        loadRecent();
      }
    } catch {
      errorBox.textContent = 'Network error. Please try again.';
      errorBox.style.display = '';
      document.getElementById('weather-result').innerHTML = HINT;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  });

  loadRecent();
</script>
</body>
</html>

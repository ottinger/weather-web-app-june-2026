<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lookup History — Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top: #0d1b2e;
      --bg-mid: #112240;
      --bg-bot: #0d2818;
      --card: rgba(255,255,255,0.06);
      --card-hover: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --text: #e8f4fd;
      --muted: #7fb3d3;
      --accent: #4fc3f7;
      --green: #86efac;
      --red: #fca5a5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bot) 100%);
      min-height: 100vh;
      color: var(--text);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.15s;
    }
    .nav a:hover { color: var(--accent); }
    .nav-sep { color: var(--border); }

    /* ── Header ── */
    header { margin-bottom: 2rem; }
    header h1 {
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    header p { color: var(--muted); font-size: 0.9rem; }

    /* ── Stats strip ── */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 130px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 200;
      line-height: 1;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-bar input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 0.6rem 0.9rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-bar input[type="text"]:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--muted); }
    .filter-bar select {
      padding: 0.6rem 0.9rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .filter-bar select option { background: #112240; }
    .filter-bar button {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: #0d1b2e;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .filter-bar button:hover { opacity: 0.85; }
    .filter-bar .clear-btn {
      padding: 0.6rem 1rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .filter-bar .clear-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Result count ── */
    .result-info {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }
    thead th {
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--card-hover); }

    .col-time { white-space: nowrap; color: var(--muted); font-size: 0.8rem; }
    .col-query { font-weight: 500; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-location { color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-conditions { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-status { text-align: center; white-space: nowrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-ok  { background: rgba(134,239,172,0.12); color: var(--green); }
    .badge-err { background: rgba(252,165,165,0.12); color: var(--red);   }

    .error-tip {
      max-width: 220px;
      white-space: normal;
      font-size: 0.78rem;
      color: var(--red);
      line-height: 1.4;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .pagination a, .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.2rem;
      height: 2.2rem;
      padding: 0 0.6rem;
      border-radius: 8px;
      font-size: 0.88rem;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .pagination a:hover { background: var(--card-hover); color: var(--text); }
    .pagination .current { background: var(--accent); color: #0d1b2e; font-weight: 700; border-color: var(--accent); }
    .pagination .disabled { opacity: 0.35; pointer-events: none; }
    .pagination .ellipsis { border: none; }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/">&#9925; Weather</a>
    <span class="nav-sep">›</span>
    <span style="color:var(--text)">History</span>
  </nav>

  <header>
    <h1>Lookup History</h1>
    <p>All past weather searches</p>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total lookups</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-successful">—</div>
      <div class="stat-label">Successful</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-rate">—</div>
      <div class="stat-label">Success rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-cities">—</div>
      <div class="stat-label">Unique cities</div>
    </div>
  </div>

  <form class="filter-bar" id="filter-form">
    <input type="text" id="q-input" placeholder="Filter by query…">
    <select id="status-select">
      <option value="all">All</option>
      <option value="success">Successful</option>
      <option value="failed">Failed</option>
    </select>
    <button type="submit">Filter</button>
    <a class="clear-btn" id="clear-btn" href="/history" style="display:none;">Clear</a>
  </form>

  <div class="result-info" id="result-info"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Query</th>
          <th>Location</th>
          <th>Conditions</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="history-tbody"></tbody>
    </table>
  </div>

  <div id="pagination-wrap"></div>

</div>
<script>
  function esc(v) {
    return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    const day = String(d.getDate()).padStart(2, '0');
    const h   = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${mon} ${day}, ${d.getFullYear()} ${h}:${min}`;
  }

  function renderStats(stats) {
    document.getElementById('stat-total').textContent     = stats.total;
    document.getElementById('stat-successful').textContent = stats.successful;
    document.getElementById('stat-rate').textContent      = stats.total
      ? Math.round(stats.successful / stats.total * 100) + '%' : '—';
    document.getElementById('stat-cities').textContent    = stats.unique_cities;
  }

  function renderResultInfo(total, page, totalPages, q, status) {
    let html = '';
    if (q || status !== 'all') {
      html += `${total} result${total !== 1 ? 's' : ''} matching current filters &nbsp;&middot;&nbsp; `;
    }
    html += `Page ${page} of ${totalPages}`;
    document.getElementById('result-info').innerHTML = html;
  }

  function renderTable(rows) {
    if (!rows.length) {
      document.getElementById('history-tbody').innerHTML =
        '<tr><td colspan="5" class="empty">No lookups found.</td></tr>';
      return;
    }
    document.getElementById('history-tbody').innerHTML = rows.map(row => {
      const loc = (row.nws_city && row.nws_state)
        ? esc(`${row.nws_city}, ${row.nws_state}`)
        : (row.display_name ? esc(row.display_name.substring(0, 45)) : '—');

      let cond;
      if (row.current_temp != null) {
        cond = `${esc(row.current_temp)}&deg;${esc(row.current_unit)} &nbsp;&middot;&nbsp; ${esc(row.current_forecast)}`;
      } else if (row.error_message) {
        cond = `<span class="error-tip">${esc(row.error_message.substring(0, 60))}</span>`;
      } else {
        cond = '—';
      }

      const badge = row.success
        ? '<span class="badge badge-ok">&#10003; OK</span>'
        : `<span class="badge badge-err" title="${esc(row.error_message)}">&#10007; Failed</span>`;

      return `<tr>
        <td class="col-time">${fmtDate(row.searched_at)}</td>
        <td class="col-query" title="${esc(row.query)}">${esc(row.query)}</td>
        <td class="col-location">${loc}</td>
        <td class="col-conditions">${cond}</td>
        <td class="col-status">${badge}</td>
      </tr>`;
    }).join('');
  }

  function renderPagination(page, totalPages, q, status) {
    const wrap = document.getElementById('pagination-wrap');
    if (totalPages <= 1) { wrap.innerHTML = ''; return; }

    const base = `/history?status=${encodeURIComponent(status)}${q ? '&q=' + encodeURIComponent(q) : ''}`;
    const pageLink = (p, label, cls) => {
      if (cls === 'current')  return `<span class="current">${label}</span>`;
      if (cls === 'disabled') return `<a class="disabled">${label}</a>`;
      if (cls === 'ellipsis') return `<span class="ellipsis">&hellip;</span>`;
      return `<a href="${base}&page=${p}">${label}</a>`;
    };

    let html = pageLink(page - 1, '&lsaquo; Prev', page <= 1 ? 'disabled' : '');
    for (let p = 1; p <= totalPages; p++) {
      if (p === page) {
        html += pageLink(p, p, 'current');
      } else if (p === 1 || p === totalPages || (p >= page - 2 && p <= page + 2)) {
        html += pageLink(p, p);
      } else if (p === page - 3 || p === page + 3) {
        html += pageLink(p, p, 'ellipsis');
      }
    }
    html += pageLink(page + 1, 'Next &rsaquo;', page >= totalPages ? 'disabled' : '');

    wrap.innerHTML = `<div class="pagination">${html}</div>`;
  }

  async function load() {
    const p      = new URLSearchParams(location.search);
    const page   = parseInt(p.get('page') || '1');
    const q      = p.get('q') || '';
    const status = p.get('status') || 'all';

    document.getElementById('q-input').value        = q;
    document.getElementById('status-select').value  = status;
    document.getElementById('clear-btn').style.display = (q || status !== 'all') ? '' : 'none';

    try {
      const url  = `/api/history?page=${page}&q=${encodeURIComponent(q)}&status=${encodeURIComponent(status)}`;
      const data = await fetch(url).then(r => r.json());
      renderStats(data.stats);
      renderResultInfo(data.total, data.page, data.total_pages, q, status);
      renderTable(data.rows);
      renderPagination(data.page, data.total_pages, q, status);
    } catch { /* silently fail */ }
  }

  document.getElementById('filter-form').addEventListener('submit', e => {
    e.preventDefault();
    const q      = document.getElementById('q-input').value.trim();
    const status = document.getElementById('status-select').value;
    const params = new URLSearchParams({page: '1'});
    if (q) params.set('q', q);
    if (status !== 'all') params.set('status', status);
    history.pushState({}, '', '/history?' + params);
    load();
  });

  document.addEventListener('click', e => {
    const link = e.target.closest('.pagination a:not(.disabled), #clear-btn');
    if (link) {
      e.preventDefault();
      history.pushState({}, '', link.getAttribute('href'));
      load();
    }
  });

  window.addEventListener('popstate', load);

  load();
</script>
</body>
</html>
